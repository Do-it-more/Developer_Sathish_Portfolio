<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sathish | Resume & Portfolio</title>
    <meta name="description" content="Access my professional portfolio and download my latest resume.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            /* Sleek Dark Mode Background */
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Glowing Background Elements */
        .bg-shape {
            position: absolute;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.5;
            animation: float 12s infinite ease-in-out alternate;
            border-radius: 50%;
        }
        
        .shape-1 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            top: -150px;
            left: -100px;
        }

        .shape-2 {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            bottom: -200px;
            right: -150px;
            animation-delay: 2s;
            opacity: 0.4;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        /* Main Glassmorphism CardContainer */
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3.5rem 2rem;
            border-radius: 28px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Avatar Element */
        .avatar-container {
            width: 104px;
            height: 104px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            padding: 3px;
            position: relative;
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(139, 92, 246, 0.4); }
            100% { box-shadow: 0 0 25px rgba(139, 92, 246, 0.8); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            background-color: #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #f8fafc;
        }

        /* Typography */
        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Action Buttons */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1.1rem 1.5rem;
            border-radius: 14px;
            font-size: 1.125rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Primary Button */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        .btn-primary:hover::before {
            opacity: 1;
        }

        /* Secondary Button */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .icon {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <!-- Abstract Backgrounds -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <main class="card">
        <!-- Professional Avatar Graphic -->
        <div class="avatar-container">
            <div class="avatar">
                <i class="fa-solid fa-briefcase"></i>
            </div>
        </div>
        
        <h1>Welcome!</h1>
        <p>Thanks for viewing my resume. What would you like to do next?</p>

        <div class="btn-container">
            <!-- Primary Action: View Portfolio -->
            <a href="portfolio.html" class="btn btn-primary" id="btn-portfolio">
                <i class="fa-solid fa-rocket icon"></i>
                Portfolio
            </a>
            
            <!-- Secondary Action: View Resume -->
            <a href="https://purple-cindi-69.tiiny.site" target="_blank" class="btn btn-secondary" id="btn-resume">
                <i class="fa-solid fa-file-pdf icon"></i>
                Resume
            </a>
        </div>
    </main>
</body>
</html>
